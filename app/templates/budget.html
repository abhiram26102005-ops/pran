{% extends "base.html" %}
{% block content %}
<div class="page-heading"><h1>Budget Management</h1></div>
<div class="content-grid">
  <section class="panel glass">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label class="form-label">Set Monthly Budget</label>
      <input class="form-control form-control-lg" type="number" min="0" step="0.01" name="monthly_budget" value="{{ data.budget }}">
      <div class="d-flex gap-2 mt-3"><button class="btn btn-primary">Edit Budget</button><button class="btn btn-outline-danger" name="action" value="delete">Delete Budget</button></div>
    </form>
  </section>
  <section class="panel glass">
    <h2>Budget Status</h2>
    <div class="budget-summary"><span>Budget Limit</span><strong>${{ '%.2f'|format(data.budget) }}</strong></div>
    <div class="budget-summary"><span>Current Spending</span><strong>${{ '%.2f'|format(data.monthly_spend) }}</strong></div>
    <div class="budget-summary"><span>Remaining Budget</span><strong>${{ '%.2f'|format(data.remaining_budget) }}</strong></div>
    <div class="progress mt-3" role="progressbar"><div class="progress-bar budget-progress" style="width: {{ [used_pct,100]|min }}%" data-used="{{ used_pct }}">{{ used_pct }}%</div></div>
  </section>
</div>
{% endblock %}
