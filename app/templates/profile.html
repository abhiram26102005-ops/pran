{% extends "base.html" %}
{% block content %}
<div class="page-heading"><h1>Profile</h1><a class="btn btn-outline-danger" href="{{ url_for('logout') }}">Logout</a></div>
<section class="panel glass profile-panel">
  <img class="avatar" src="{% if user.profile_photo %}{{ url_for('static', filename='uploads/' ~ user.profile_photo) }}{% else %}https://ui-avatars.com/api/?name={{ user.name|urlencode }}&background=2563EB&color=fff{% endif %}" alt="Profile photo">
  <form method="post" enctype="multipart/form-data" class="row g-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" name="name" value="{{ user.name }}"></div>
    <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" type="email" name="email" value="{{ user.email }}"></div>
    <div class="col-md-6"><label class="form-label">Password Update</label><input class="form-control" type="password" name="password" placeholder="Leave blank to keep current"></div>
    <div class="col-md-6"><label class="form-label">Profile Photo</label><input class="form-control" type="file" name="profile_photo" accept="image/*"></div>
    <div class="col-12"><button class="btn btn-primary">Edit Profile</button></div>
  </form>
</section>
{% endblock %}
